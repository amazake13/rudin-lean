name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - name: Report remaining sorries
        run: |
          {
            echo '## Remaining `sorry`s per chapter'
            ./scripts/count_sorries.sh
          } >> "$GITHUB_STEP_SUMMARY"
